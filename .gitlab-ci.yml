stages:
  - prepare
  - sast
  - dependency_scan
  - secret_scan
  - docker_build
  - docker_scan
  - deploy
  - notify

variables:
  IMAGE_NAME: "devsecops-demo-app"
  IMAGE_TAG: "latest"
  PIPELINE_MODE: "full"

before_script:
  - |
    echo "Pipeline mode: $PIPELINE_MODE"

prepare:
  stage: prepare
  image: python:3.11-slim
  script:
    - echo "Preparing pipeline..."
    - python --version
  rules:
    - when: always

sast_semgrep:
  stage: sast
  image: semgrep/semgrep:latest
  script:
    - semgrep scan --config auto --json --output semgrep-report.json .
  artifacts:
    paths:
      - semgrep-report.json
  rules:
    - if: '$PIPELINE_MODE == "full"'
    - when: never

dependency_scan_python:
  stage: dependency_scan
  image: python:3.11-slim
  script:
    - pip install pip-audit
    - pip-audit -r app/requirements.txt || true
  rules:
    - if: '$PIPELINE_MODE == "full"'
    - when: never

secret_scan_gitleaks:
  stage: secret_scan
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --source . || true
  rules:
    - if: '$PIPELINE_MODE == "full"'
    - when: never

docker_build:
  stage: docker_build
  image: alpine:latest
  script:
    - echo "docker build simulated"
  rules:
    - if: '$PIPELINE_MODE == "full"'
    - when: never

docker_scan_trivy:
  stage: docker_scan
  image: aquasec/trivy:latest
  script:
    - trivy fs --format json --output trivy-report.json .
  artifacts:
    paths:
      - trivy-report.json
  rules:
    - if: '$PIPELINE_MODE == "full"'
    - when: never

deploy_local:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploy simulated"
  rules:
    - if: '$PIPELINE_MODE == "full"'
    - when: never

notify_final:
  stage: notify
  image: alpine:latest
  script:
    - |
      echo "Pipeline mode: $PIPELINE_MODE"
  when: always