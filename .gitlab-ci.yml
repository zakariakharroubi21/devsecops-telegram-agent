stages:
  - prepare
  - sast
  - dependency_scan
  - secret_scan
  - docker_build
  - docker_scan
  - deploy
  - notify

variables:
  IMAGE_NAME: "devsecops-demo-app"
  IMAGE_TAG: "latest"
  PIPELINE_MODE: "full"

before_script:
  - |
    echo "Pipeline mode: $PIPELINE_MODE"

# -------------------------
# PREPARE
# -------------------------
prepare:
  stage: prepare
  image: python:3.11-slim
  script:
    - echo "Preparing pipeline..."
    - python --version
  rules:
    - when: always

# -------------------------
# SAST (SEMGREP)
# -------------------------
sast_semgrep:
  stage: sast
  image: semgrep/semgrep:latest
  script:
    - semgrep scan --config auto --json --output semgrep-report.json .
  artifacts:
    paths:
      - semgrep-report.json
  rules:
    - if: '$PIPELINE_MODE == "scan" || $PIPELINE_MODE == "full"'

# -------------------------
# DEPENDENCY SCAN
# -------------------------
dependency_scan_python:
  stage: dependency_scan
  image: python:3.11-slim
  script:
    - pip install pip-audit
    - pip-audit -r app/requirements.txt -f json -o pipaudit-report.json || true
  artifacts:
    paths:
      - pipaudit-report.json
  rules:
    - if: '$PIPELINE_MODE == "scan" || $PIPELINE_MODE == "full"'

# -------------------------
# SECRET SCAN (GITLEAKS)
# -------------------------
secret_scan_gitleaks:
  stage: secret_scan
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - echo "Running Gitleaks..."
    - gitleaks detect --source . --no-git --report-format json --report-path gitleaks-report.json || true
  artifacts:
    paths:
      - gitleaks-report.json
  rules:
    - if: '$PIPELINE_MODE == "scan" || $PIPELINE_MODE == "full"'

# -------------------------
# DOCKER BUILD (SIMULATED OR REAL)
# -------------------------
docker_build:
  stage: docker_build
  image: alpine:latest
  script:
    - echo "docker build simulated"
  rules:
    - if: '$PIPELINE_MODE == "full"'

# -------------------------
# DOCKER SCAN (TRIVY)
# -------------------------
docker_scan_trivy:
  stage: docker_scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy fs --format json --output trivy-report.json .
  artifacts:
    paths:
      - trivy-report.json
  rules:
    - if: '$PIPELINE_MODE == "scan" || $PIPELINE_MODE == "full"'

# -------------------------
# DEPLOY
# -------------------------
deploy_local:
  stage: deploy
  image: docker:24

  services:
    - docker:24-dind

  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""

  script:
    - docker build -t devsecops-demo-app .
    - docker stop devsecops-demo-app || true
    - docker rm devsecops-demo-app || true
    - docker run -d -p 5000:5000 --name devsecops-demo-app devsecops-demo-app

  rules:
    - if: '$PIPELINE_MODE == "deploy" || $PIPELINE_MODE == "full"'
# -------------------------
# REPORT GENERATION (KEY PART)
# -------------------------
generate_report:
  stage: notify
  image: python:3.11-slim

  needs:
    - sast_semgrep
    - dependency_scan_python
    - secret_scan_gitleaks
    - docker_scan_trivy

  script:
    - pip install -r requirements-ci.txt
    - python scripts/build_scan_report.py
    - python scripts/send_to_telegram.py

  artifacts:
    paths:
      - telegram-report.txt

  when: always
  rules:
    - if: '$PIPELINE_MODE == "scan" || $PIPELINE_MODE == "full"'